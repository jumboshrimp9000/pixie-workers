x-google-worker-common: &google-worker-common
  build: .
  restart: unless-stopped
  env_file:
    - .env.worker
  volumes:
    - google-logs:/app/app/logs
  healthcheck:
    test: ["CMD-SHELL", "test -f /tmp/pixie_google_smartlead_heartbeat && find /tmp/pixie_google_smartlead_heartbeat -newermt '-120 seconds' | grep -q ."]
    interval: 60s
    timeout: 5s
    start_period: 30s
    retries: 3

services:
  pixie-google-paid-worker:
    <<: *google-worker-common
    container_name: pixie-google-paid-worker
    command:
      - /bin/sh
      - -c
      - |
        export GOOGLE_WORKER_ACTION_TYPES="$${GOOGLE_WORKER_ACTION_TYPES:-google_provision}"
        export GOOGLE_LIFECYCLE_ACTION_TYPES="$${GOOGLE_LIFECYCLE_ACTION_TYPES:-google_add_inboxes,google_remove_inboxes,google_update_inboxes,google_update_profile_photos}"
        exec python3 main.py

  pixie-google-free-nonprofit-worker:
    <<: *google-worker-common
    container_name: pixie-google-free-nonprofit-worker
    command:
      - /bin/sh
      - -c
      - |
        export NONPROFIT_GOOGLE_ACTION_TYPES="$${NONPROFIT_GOOGLE_ACTION_TYPES:-free_google_provision,free_google_cancel_domain}"
        export NONPROFIT_GOOGLE_POLL_SECONDS="$${NONPROFIT_GOOGLE_POLL_SECONDS:-10}"
        export NONPROFIT_GOOGLE_PLAYWRIGHT_HEADLESS="$${NONPROFIT_GOOGLE_PLAYWRIGHT_HEADLESS:-true}"
        export NONPROFIT_GOOGLE_REQUIRE_MFA_ENROLLMENT="$${NONPROFIT_GOOGLE_REQUIRE_MFA_ENROLLMENT:-true}"
        export NONPROFIT_GOOGLE_USER_OP_VAULT="$${NONPROFIT_GOOGLE_USER_OP_VAULT:-icje7jpscrdm6xtlcr252zxinq}"
        exec python3 main_nonprofit.py

volumes:
  google-logs:
